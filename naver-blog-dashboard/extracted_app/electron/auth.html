<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인증 코드 입력</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f8fafc;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    user-select: none;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    padding: 32px 36px;
    width: 360px;
    text-align: center;
  }
  .logo {
    font-size: 28px;
    margin-bottom: 6px;
  }
  .app-name {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 20px;
  }
  .period {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 20px;
  }
  .period-label {
    font-size: 11px;
    color: #16a34a;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }
  .period-value {
    font-size: 18px;
    font-weight: 700;
    color: #15803d;
  }
  .desc {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .input-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  input[type="text"] {
    width: 100%;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-align: center;
    text-transform: lowercase;
    outline: none;
    transition: border-color 0.2s;
    color: #0f172a;
  }
  input[type="text"]:focus {
    border-color: #03c75a;
  }
  input[type="text"].error {
    border-color: #ef4444;
    animation: shake 0.3s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .error-msg {
    font-size: 12px;
    color: #ef4444;
    margin-bottom: 12px;
    min-height: 16px;
  }
  .btn-submit {
    width: 100%;
    background: #03c75a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-submit:hover { background: #02a84b; }
  .btn-submit:active { transform: scale(0.98); }
  .btn-quit {
    margin-top: 10px;
    background: none;
    border: none;
    font-size: 11px;
    color: #cbd5e1;
    cursor: pointer;
    padding: 4px;
    text-decoration: underline;
  }
  .btn-quit:hover { color: #94a3b8; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔐</div>
  <div class="app-name">네이버 블로그 SEO 최적화 도우미</div>
  <div class="period">
    <div class="period-label">인증 기간</div>
    <div class="period-value" id="periodText">불러오는 중...</div>
  </div>
  <div class="desc">공식 사이트의 이번 달 인증 번호를 입력하세요.</div>
  <div class="input-wrap">
    <input type="text" id="codeInput" placeholder="코드 입력" maxlength="10" autocomplete="off" spellcheck="false" />
  </div>
  <div class="error-msg" id="errMsg"></div>
  <button class="btn-submit" id="btnSubmit">확인</button>
  <button class="btn-quit" id="btnQuit">앱 종료</button>
</div>

<script>
  const inp = document.getElementById('codeInput');
  const btn = document.getElementById('btnSubmit');
  const err = document.getElementById('errMsg');
  const period = document.getElementById('periodText');
  const btnQuit = document.getElementById('btnQuit');

  window.authAPI.onInit(({ year, month }) => {
    const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    period.textContent = `${year}년 ${months[month - 1]}`;
  });

  window.authAPI.onError((msg) => {
    err.textContent = msg;
    inp.classList.add('error');
    inp.value = '';
    setTimeout(() => { inp.classList.remove('error'); inp.focus(); }, 400);
  });

  function submit() {
    const code = inp.value.trim().toLowerCase();
    if (!code) { err.textContent = '코드를 입력하세요.'; inp.focus(); return; }
    err.textContent = '';
    window.authAPI.submit(code);
  }

  btn.addEventListener('click', submit);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  btnQuit.addEventListener('click', () => window.authAPI.quit());

  window.addEventListener('DOMContentLoaded', () => inp.focus());
</script>
</body>
</html>
